<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pro-Editor (No Grammar)</title>
    <!-- CKEditor über CDN -->
    <link rel="stylesheet" href="https://cdn.ckeditor.com/ckeditor5/47.5.0/ckeditor5.css">
    <style>
        /* Macht den Editor zu einem "A4-Blatt" auf dem Bildschirm */
        .ck-editor__editable {
            width: 21cm;
            min-height: 29.7cm;
            padding: 2cm !important;
            margin: 1rem auto;
            border: 1px solid #ddd !important;
            background-color: white;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        body { background-color: #f4f4f4; }

        /* Druck-Logik: NUR das Blatt drucken, keine Toolbar, kein Hintergrund */
        @media print {
            body { background: none; }
            .ck-toolbar { display: none !important; }
            .ck-editor__editable {
                border: none !important;
                box-shadow: none !important;
                margin: 0 !important;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="editor">
        <p>Text hier eingeben...</p>
    </div>

    <!-- CKEditor Library laden -->
    <script src="https://cdn.ckeditor.com/ckeditor5/47.5.0/ckeditor5.umd.js"></script>

    <script>
        const {
            ClassicEditor,
            Essentials,
            Paragraph,
            Bold,
            Italic,
            List,
            Font
        } = CKEDITOR;

        ClassicEditor
            .create( document.querySelector( '#editor' ), {
                licenseKey: 'GPL', 
                plugins: [ Essentials, Paragraph, Bold, Italic, List, Font ],
                toolbar: [ 'undo', 'redo', '|', 'bold', 'italic', '|', 'bulletedList', 'numberedList', 'fontSize', 'fontFamily', 'fontColor', 'fontBackgroundColor' ],
                // Grammatikhilfe deaktivieren
                browserSpellcheck: false, 
            } )
            .then( editor => {
                window.editor = editor;
                
                // Zusätzlicher Schutz: Browser-Attribute setzen
                const view = editor.editing.view;
                view.change( writer => {
                    writer.setAttribute( 'spellcheck', 'false', view.document.getRoot() );
                    writer.setAttribute( 'autocorrect', 'off', view.document.getRoot() );
                    writer.setAttribute( 'autocapitalize', 'off', view.document.getRoot() );
                } );
            } )
            .catch( error => {
                console.error( error );
            } );
    </script>
</body>
</html>
